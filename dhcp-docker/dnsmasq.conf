# dnsmasq config for a direct point-to-point DHCP link to a single embedded
# device over enp9s0u1u4u2u4. Only speaks DHCP -- DNS proxying is disabled
# (port=0) so this doesn't fight with the host's own resolver/port 53.

# Only bind to this interface (container runs with --network host, so
# without this dnsmasq would otherwise see every host interface).
interface=enp9s0u1u4u2u4
bind-interfaces
except-interface=lo

# Disable dnsmasq's DNS server -- DHCP only.
port=0

# Single-address range: the only client on this link always gets .2.
# The host side of the link is expected to already be 10.13.13.1/24
# (see ../setup-routing.sh).
dhcp-range=10.13.13.2,10.13.13.2,255.255.255.0,12h

# Point the device back at the host for its default route.
dhcp-option=option:router,10.13.13.1

# Public DNS resolvers, since we're not running a DNS proxy ourselves.
dhcp-option=option:dns-server,1.1.1.1,8.8.8.8

# Reply fast / don't wait around for other DHCP servers on the segment.
dhcp-authoritative

log-dhcp
no-daemon
